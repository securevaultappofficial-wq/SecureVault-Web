    <script>
      (function () {
        var redirects = {
          features: "/features.html",
          blogs: "/blog.html",
          scams: "/scam-protection.html",
          "ai-reports": "/ai-security-adviser.html",
          "developer-portfolio": "/developer-portfolio.html"
        };
        var page = new URLSearchParams(window.location.search).get("page");
        if (page && redirects[page]) {
          window.location.replace(redirects[page]);
        }
      })();
    </script>
    <script>
      window.runWhenIdle = window.runWhenIdle || function (callback) {
        if ("requestIdleCallback" in window) {
          requestIdleCallback(callback, { timeout: 4000 });
        } else {
          setTimeout(callback, 4000);
        }
      };
      window.addEventListener("load", function () {
        var loadAdsOnce = function () {
          window.runWhenIdle(function () {
            if (document.querySelector('script[data-securevault-adsense="true"]')) return;
            var script = document.createElement("script");
            script.async = true;
            script.crossOrigin = "anonymous";
            script.dataset.securevaultAdsense = "true";
            script.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3203946703005160";
            document.head.appendChild(script);
          });
          window.removeEventListener("scroll", loadAdsOnce);
          window.removeEventListener("pointerdown", loadAdsOnce);
          window.removeEventListener("keydown", loadAdsOnce);
        };
        window.addEventListener("scroll", loadAdsOnce, { passive: true, once: true });
        window.addEventListener("pointerdown", loadAdsOnce, { passive: true, once: true });
        window.addEventListener("keydown", loadAdsOnce, { once: true });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
